[EMC]
MACHINE = TORNO_ICEQ
DEBUG = 0

[DISPLAY]
DISPLAY = axis
POSITION_OFFSET = RELATIVE
POSITION_FEEDBACK = ACTUAL
PROGRAM_PREFIX = ../../nc_files

[KINS]
KINEMATICS = trivkins coordinates=XZ
JOINTS = 2

[TRAJ]
COORDINATES = X Z A B C
LINEAR_UNITS = mm
ANGULAR_UNITS = degree

[HAL]
HALFILE = io.hal
HALFILE = motion.hal

[EMCMOT]
EMCMOT = motmod
SERVO_PERIOD = 1000000

[AXIS_X]
MAX_VELOCITY = 50
MAX_ACCELERATION = 100

[AXIS_Z]
MAX_VELOCITY = 50
MAX_ACCELERATION = 100

[AXIS_B]
MAX_VELOCITY = 1000
MAX_ACCELERATION = 3000
MIN_LIMIT = -999999
MAX_LIMIT = 999999

[JOINT_3]
TYPE = ANGULAR
HOME = 0.0
MAX_VELOCITY = 1000
MAX_ACCELERATION = 3000
STEPGEN_MAXACCEL = 3500
SCALE = 100
FERROR = 1
MIN_FERROR = 0.25
MIN_LIMIT = -999999
MAX_LIMIT = 999999
HOME_OFFSET = 0.0
HOME_SEARCH_VEL = 0.0
HOME_LATCH_VEL = 0.0
HOME_SEQUENCE = 0