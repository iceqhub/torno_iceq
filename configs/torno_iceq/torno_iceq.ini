HOME_LATCH_VEL = 0.00000
HOME_FINAL_VEL = 0.000000
HOME_USE_INDEX = NO
HOME_SEQUENCE = 1


#******************************************
# SPINDLE — Servo HLTNC 3.8kW step/dir
#******************************************
[SPINDLE_0]
P = 0.0
I = 0.0
