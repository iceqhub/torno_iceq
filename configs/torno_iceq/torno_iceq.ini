# TORNO_ICEQ.ini — Versão 4.0
# Adicionado: seção [MPG] para handwheel

[EMC]
MACHINE = TORNO_ICEQ
DEBUG = 0

[DISPLAY]
DISPLAY = axis
TKPKG = Ngcgui 1.0
NGCGUI_PREAMBLE  = .ngcgui_start.ngc
NGCGUI_POSTAMBLE = .ngcgui_FIN.ngc
NGCGUI_FONT      = Helvetica -9 normal
NGCGUI_OPTIONS   = nonew noremove
NGCGUI_SUBFILE = /home/iceq/torno_iceq/nc_files/.facear.ngc
NGCGUI_SUBFILE = /home/iceq/torno_iceq/nc_files/.cilindrar.ngc
NGCGUI_SUBFILE = /home/iceq/torno_iceq/nc_files/.furar.ngc
NGCGUI_SUBFILE = /home/iceq/torno_iceq/nc_files/.rosquear.ngc
NGCGUI_SUBFILE = /home/iceq/torno_iceq/nc_files/.sangrar.ngc

EDITOR = gedit
TOOL_EDITOR = tooledit
POSITION_OFFSET = RELATIVE
POSITION_FEEDBACK = ACTUAL
MAX_FEED_OVERRIDE = 2.0
MAX_SPINDLE_OVERRIDE = 1.5
DEFAULT_SPINDLE_SPEED = 300
PROGRAM_PREFIX = /home/iceq/torno_iceq/nc_files
INTRO_GRAPHIC = linuxcnc.gif
INTRO_TIME = 2
INCREMENTS = 1.0 0.1 0.01 0.001
PYVCP = custompanel.xml
OPEN_FILE = ""

[FILTER]
PROGRAM_EXTENSION = .ngc,.nc G-Code Files
ngc = cat
nc  = cat

[PYTHON]
TOPLEVEL    = /home/iceq/torno_iceq/configs/torno_iceq
PATH_PREPEND = /home/iceq/torno_iceq/configs/torno_iceq

[RS274NGC]
PARAMETER_FILE = torno_iceq.var
SUBROUTINE_PATH = /home/iceq/torno_iceq/nc_files
RS274NGC_STARTUP_CODE = G18 G20 G90

[EMCMOT]
EMCMOT      = motmod
COMM_TIMEOUT = 1.0
SERVO_PERIOD = 1000000

[HOSTMOT2]
DRIVER    = hm2_eth
IPADDR    = 192.168.1.121
BOARD     = 7i96s
CONFIG    = "num_encoders=1 num_pwmgens=1 num_stepgens=3"

[TASK]
TASK    = milltask
CYCLE_TIME = 0.010

[HAL]
HALFILE = torno_iceq.hal
POSTGUI_HALFILE = custom_postgui.hal
HALUI = halui

[HALUI]
MDI_COMMAND = G0 X0 Z0
MDI_COMMAND = G28

[KINS]
KINEMATICS = trivkins coordinates=XZC
JOINTS = 3

[TRAJ]
COORDINATES     = XZC
LINEAR_UNITS    = inch
ANGULAR_UNITS   = degree
DEFAULT_LINEAR_VELOCITY   = 1.0
MAX_LINEAR_VELOCITY       = 5.0
DEFAULT_LINEAR_ACCEL      = 10.0
MAX_LINEAR_ACCEL          = 30.0
DEFAULT_ANGULAR_VELOCITY  = 45.0
MAX_ANGULAR_VELOCITY      = 360.0

# ============================================================
# MPG — Handwheel 100PPR chinesa
# SCALE = pulsos por unidade (100 PPR → 100 pulsos = 1 "volta")
# O jog real em mm/polegada é controlado pela escala no painel
# ============================================================
[MPG]
SCALE = 100

# ============================================================
# JOINT 0 — Eixo X
# ============================================================
[JOINT_0]
TYPE             = LINEAR
HOME             = 0.0
MAX_VELOCITY     = 1.5
MAX_ACCELERATION = 15.0
STEPGEN_MAXVEL   = 1.65
STEPGEN_MAXACCEL = 16.5
BACKLASH         = 0.000
SCALE            = -2000
STEP_SCALE       = -2000
P                = 1000
I                = 0
D                = 0
BIAS             = 0
FF0              = 0
FF1              = 1
FF2              = 0
DEADBAND         = 0.000254
MAX_OUTPUT       = 0
DIRSETUP         = 5000
DIRHOLD          = 5000
STEPLEN          = 2000
STEPSPACE        = 2000
FERROR           = 0.050
MIN_FERROR       = 0.010
MIN_LIMIT        = -12.0
MAX_LIMIT        =  0.1
HOME_OFFSET      = 0.0
HOME_SEARCH_VEL  = -0.3
HOME_LATCH_VEL   = 0.05
HOME_SEQUENCE    = 1
VOLATILE_HOME    = 0

# ============================================================
# JOINT 1 — Eixo Z
# ============================================================
[JOINT_1]
TYPE             = LINEAR
HOME             = 0.0
MAX_VELOCITY     = 2.0
MAX_ACCELERATION = 20.0
STEPGEN_MAXVEL   = 2.2
STEPGEN_MAXACCEL = 22.0
BACKLASH         = 0.000
SCALE            = 2000
STEP_SCALE       = 2000
P                = 1000
I                = 0
D                = 0
BIAS             = 0
FF0              = 0
FF1              = 1
FF2              = 0
DEADBAND         = 0.000254
MAX_OUTPUT       = 0
DIRSETUP         = 5000
DIRHOLD          = 5000
STEPLEN          = 2000
STEPSPACE        = 2000
FERROR           = 0.050
MIN_FERROR       = 0.010
MIN_LIMIT        = -20.0
MAX_LIMIT        =  0.1
HOME_OFFSET      = 0.0
HOME_SEARCH_VEL  = 0.3
HOME_LATCH_VEL   = -0.05
HOME_SEQUENCE    = 0
VOLATILE_HOME    = 0

# ============================================================
# JOINT 2 — Eixo C (Torre)
# ============================================================
[JOINT_2]
TYPE             = ANGULAR
HOME             = 0.0
MAX_VELOCITY     = 90.0
MAX_ACCELERATION = 360.0
STEPGEN_MAXVEL   = 100.0
STEPGEN_MAXACCEL = 400.0
SCALE            = 100
STEP_SCALE       = 100
DIRSETUP         = 5000
DIRHOLD          = 5000
STEPLEN          = 2000
STEPSPACE        = 2000
FERROR           = 1.0
MIN_FERROR       = 0.5
MIN_LIMIT        = -9999.0
MAX_LIMIT        =  9999.0
HOME_OFFSET      = 0.0
HOME_SEQUENCE    = -1
VOLATILE_HOME    = 1

# ============================================================
# SPINDLE
# ============================================================
[SPINDLE_0]
OUTPUT_SCALE   = 1200
ENCODER_SCALE  = 600
MIN_FORWARD_VELOCITY =   5.0
MAX_FORWARD_VELOCITY = 1200.0
MIN_REVERSE_VELOCITY =  -5.0
MAX_REVERSE_VELOCITY = -1200.0
HOME_SEARCH_VEL = 0
