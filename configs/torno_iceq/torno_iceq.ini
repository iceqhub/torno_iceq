[EMC]
MACHINE = TORNO_ICEQ
DEBUG = 0

[DISPLAY]
DISPLAY = axis
POSITION_OFFSET = RELATIVE
POSITION_FEEDBACK = ACTUAL
PROGRAM_PREFIX = ../../nc_files

[KINS]
KINEMATICS = trivkins coordinates=XZ
JOINTS = 2

[TRAJ]
COORDINATES = X Z A B C
LINEAR_UNITS = mm
ANGULAR_UNITS = degree

[HAL]
HALFILE = io.hal
HALFILE = motion.hal

[EMCMOT]
EMCMOT = motmod
SERVO_PERIOD = 1000000

[AXIS_X]
MAX_VELOCITY = 45
MAX_ACCELERATION = 200.0
MIN_LIMIT = -200.001
MAX_LIMIT = 0.001

[JOINT_0]
TYPE = LINEAR
HOME = 0.0
MIN_LIMIT = -200.001
MAX_LIMIT = 0.001
MAX_VELOCITY = 45
MAX_ACCELERATION = 200.0
STEPGEN_MAXACCEL = 550
SCALE = 400
FERROR = 1
BACKLASH = 0.005
MIN_FERROR = 0.25
HOME_OFFSET = 2.0
HOME_SEARCH_VEL = 20.0
HOME_LATCH_VEL = 5.0
HOME_SEQUENCE = 0


[AXIS_Z]
MAX_VELOCITY = 45
MAX_ACCELERATION = 200.0
MIN_LIMIT = -670.0
MAX_LIMIT = 0.001

[JOINT_1]
TYPE = LINEAR
HOME = 0.0
MIN_LIMIT = -670.0
MAX_LIMIT = 0.001
MAX_VELOCITY = 45
MAX_ACCELERATION = 200.0
STEPGEN_MAXACCEL = 550
SCALE = 400
FERROR = 1
BACKLASH = 0.005
MIN_FERROR = 0.25
HOME_OFFSET = 4.0
HOME_SEARCH_VEL = 20.0
HOME_LATCH_VEL = 5.0
HOME_SEQUENCE = 1


[AXIS_B]
MAX_VELOCITY = 1000
MAX_ACCELERATION = 3000
MIN_LIMIT = -999999
MAX_LIMIT = 999999

[JOINT_3]
TYPE = ANGULAR
HOME = 0.0
