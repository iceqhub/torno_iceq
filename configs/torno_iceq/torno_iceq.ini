[EMC]
MACHINE = TORNO_ICEQ
DEBUG = 0

[DISPLAY]
DISPLAY = axis
POSITION_OFFSET = RELATIVE
POSITION_FEEDBACK = ACTUAL
PROGRAM_PREFIX = ../../nc_files
LATHE = 1
OPEN_FILE = ../../nc_files/ini.ngc

[KINS]
KINEMATICS = trivkins coordinates=XZAB
JOINTS = 4

[TRAJ]
COORDINATES = X Z A B
LINEAR_UNITS = mm
ANGULAR_UNITS = degree
DEFAULT_LINEAR_VELOCITY = 15
MAX_VELOCITY = 45.0
NO_FORCE_HOMING = 1

[HAL]
HALFILE = motion.hal
HALFILE = inputs.hal
HALFILE = ui_bridge.hal
HALFILE = io_map.hal

[EMCMOT]
EMCMOT = motmod
SERVO_PERIOD = 1000000

[EMCIO]
EMCIO = io
CYCLE_TIME = 0.100
TOOL_TABLE = tool.tbl
TOOL_CHANGE_WITH_SPINDLE_ON = 1

[RS274NGC]
PARAMETER_FILE = linuxcnc.var
RS274NGC_STARTUP_CODE = o<.startup>call
FEATURES = 12
REMAP = M6 modalgroup=6 ngc=.m6

[AXIS_X]
MAX_VELOCITY = 45
MAX_ACCELERATION = 200.0
MIN_LIMIT = -200.001
MAX_LIMIT = 0.001

[JOINT_0]
TYPE = LINEAR
HOME = 0.0
MIN_LIMIT = -200.001
MAX_LIMIT = 0.001
MAX_VELOCITY = 45
MAX_ACCELERATION = 200.0
STEPGEN_MAXACCEL = 550
SCALE = 400
FERROR = 1
BACKLASH = 0.005
MIN_FERROR = 0.25
HOME_OFFSET = 2.0
HOME_SEARCH_VEL = 20.0
HOME_LATCH_VEL = 5.0
HOME_SEQUENCE = 0

[AXIS_Z]
MAX_VELOCITY = 45
MAX_ACCELERATION = 200.0
MIN_LIMIT = -670.0
MAX_LIMIT = 0.001

[JOINT_1]
TYPE = LINEAR
HOME = 0.0
MIN_LIMIT = -670.0
MAX_LIMIT = 0.001
MAX_VELOCITY = 45
MAX_ACCELERATION = 200.0
STEPGEN_MAXACCEL = 550
SCALE = 400
FERROR = 1
BACKLASH = 0.005
MIN_FERROR = 0.25
HOME_OFFSET = 4.0
HOME_SEARCH_VEL = 20.0
HOME_LATCH_VEL = 5.0
HOME_SEQUENCE = 1

[AXIS_A]
MAX_VELOCITY = 550
MAX_ACCELERATION = 5000
MIN_LIMIT = -999999
MAX_LIMIT = 999999

[JOINT_2]
TYPE = ANGULAR
HOME = 0.0
MAX_VELOCITY = 550
MAX_ACCELERATION = 5000
STEPGEN_MAXACCEL = 4000
SCALE = 40
FERROR = 1
BACKLASH = 0.02
MIN_FERROR = 0.25
MIN_LIMIT = -999999
MAX_LIMIT = 999999
HOME_OFFSET = 0.0
HOME_SEARCH_VEL = 0.0
HOME_LATCH_VEL = 0.0
HOME_SEQUENCE = 0

[AXIS_B]
MAX_VELOCITY = 1000
MAX_ACCELERATION = 3000
MIN_LIMIT = -999999
MAX_LIMIT = 999999

[JOINT_3]
TYPE = ANGULAR
HOME = 0.0
MAX_VELOCITY = 1000
MAX_ACCELERATION = 3000
STEPGEN_MAXACCEL = 3500
SCALE = 100
FERROR = 1
MIN_FERROR = 0.25
MIN_LIMIT = -999999
MAX_LIMIT = 999999
HOME_OFFSET = 0.0
HOME_SEARCH_VEL = 0.0
HOME_LATCH_VEL = 0.0
HOME_SEQUENCE = 0

; FUTURO:
