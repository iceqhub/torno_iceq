[EMC]
MACHINE = TORNO_ICEQ
DEBUG = 0

[DISPLAY]
DISPLAY = axis
POSITION_OFFSET = RELATIVE
POSITION_FEEDBACK = ACTUAL
PROGRAM_PREFIX = ../../nc_files

[KINS]
KINEMATICS = trivkins coordinates=XZ
JOINTS = 2

[TRAJ]
COORDINATES = X Z
LINEAR_UNITS = mm
ANGULAR_UNITS = degree

[HAL]
HALFILE = io.hal
HALFILE = motion.hal

[EMCMOT]
EMCMOT = motmod
SERVO_PERIOD = 1000000

[AXIS_X]
MAX_VELOCITY = 50
MAX_ACCELERATION = 100

[AXIS_Z]
MAX_VELOCITY = 50
MAX_ACCELERATION = 100
