# torno_iceq.ini
# Versão: 4.0 — Tela personalizada PyQt5 (iceq_torno.py)
# Baseado na config estável torno_iceq (validado em bancada)
#
# Parâmetros que DEVEM ser ajustados antes de ligar os motores:
#   [JOINT_0] STEP_SCALE  = passos/mm do driver X  (atual: -400.0)
#   [JOINT_1] STEP_SCALE  = passos/mm do driver Z  (atual:  400.0)
#   [JOINT_2] STEP_SCALE  = passos/grau da torre
#   [SPINDLE_0] MAX_OUTPUT = RPM máximo real com polia atual (atual: 1200)

[EMC]
MACHINE = TORNO_ICEQ
DEBUG = 0
VERSION = 1.1

[DISPLAY]
# Tela personalizada PyQt5 — substitui o Axis completamente
DISPLAY = /home/iceq/torno_iceq/configs/torno_iceq/iceq_torno.sh
POSITION_OFFSET = RELATIVE
POSITION_FEEDBACK = ACTUAL
MAX_FEED_OVERRIDE = 1.200000
MAX_SPINDLE_OVERRIDE = 1.200000
MIN_SPINDLE_OVERRIDE = 0.000000
INTRO_GRAPHIC = linuxcnc.gif
INTRO_TIME = 5
PROGRAM_PREFIX = /home/iceq/torno_iceq/nc_files
INCREMENTS = 5mm 1mm .5mm .1mm .05mm .01mm .005mm
LATHE = 1
POSITION_FEEDBACK = ACTUAL
DEFAULT_LINEAR_VELOCITY = 45.000000
MAX_LINEAR_VELOCITY = 45.000000
MIN_LINEAR_VELOCITY = 0.000000
DEFAULT_ANGULAR_VELOCITY = 36.000000
MAX_ANGULAR_VELOCITY = 360.000000
MIN_ANGULAR_VELOCITY = 0.000000
EDITOR = gedit
GEOMETRY = xz
CYCLE_TIME = 100
# Tela PyQt5: sem PYVCP (removido)
# PYVCP = custompanel.xml  ← desativado

# Painel PyQt5 iniciado como USER_COMMAND_FILE ou via script externo
# (veja README_TELA.md para instruções de integração)

[FILTER]
PROGRAM_EXTENSION = .png,.gif,.jpg Greyscale Depth Image
PROGRAM_EXTENSION = .py Python Script
png = image-to-gcode
gif = image-to-gcode
jpg = image-to-gcode
py = python

[TASK]
TASK = milltask
CYCLE_TIME = 0.010

[RS274NGC]
PARAMETER_FILE = linuxcnc.var
RS274NGC_STARTUP_CODE = G21 G40 G90 G94 G97 G64 P0.025 G7
SUBROUTINE_PATH = /home/iceq/torno_iceq/nc_files:/home/iceq/torno_iceq/nc_files
REMAP = M6 modalgroup=6 ngc=.m6

[EMCMOT]
EMCMOT = motmod
COMM_TIMEOUT = 1.0
SERVO_PERIOD = 1000000

[HMOT]
CARD0 = hm2_7i96s.0

[HAL]
HALUI = halui
HALFILE = torno_iceq.hal
HALFILE = custom.hal
POSTGUI_HALFILE = custom_postgui.hal
SHUTDOWN = shutdown.hal

# ── HALUI: sem MDI_COMMANDs ──
# A tela PyQt5 executa MDI diretamente via linuxcnc.command().
# Não são necessários MDI_COMMAND aqui.
[HALUI]

[KINS]
JOINTS = 3
KINEMATICS = trivkins coordinates=XZC

[TRAJ]
COORDINATES = XZC
LINEAR_UNITS = mm
ANGULAR_UNITS = degree
DEFAULT_LINEAR_VELOCITY = 2.50
MAX_LINEAR_VELOCITY = 25.00
NO_FORCE_HOMING = 1
SPINDLES = 1

[EMCIO]
EMCIO = io
CYCLE_TIME = 0.100
TOOL_TABLE = tool.tbl
NUM_DIO = 16

# ============================================================
# MPG — Handwheel 100PPR
# Encoder software lendo TB3 input-04 (fase A) e input-05 (fase B)
# via optoacoplador 5V→24V
# ============================================================
[MPG]
SCALE = 100

# ============================================================
# EIXO X — JOINT 0
# stepgen.00 — driver X
# STEP_SCALE negativo: inverte direção (ajustar conforme driver)
# ============================================================
[AXIS_X]
MAX_VELOCITY = 45.0
MAX_ACCELERATION = 200.0
MIN_LIMIT = -200.01
MAX_LIMIT = 0.001

[JOINT_0]
TYPE = LINEAR
HOME = 0.0
FERROR = 10.0
MIN_FERROR = 1.0
MAX_VELOCITY = 45.0
MAX_ACCELERATION = 200.0
STEPGEN_MAXVEL = 50
STEPGEN_MAXACCEL = 800
P = 0.0
I = 0.0
D = 0.0
FF0 = 0.0
FF1 = 1.00
FF2 = 0.0
BIAS = 0.0
DEADBAND = 0.05
MAX_OUTPUT = 0.0
DIRSETUP   = 10000
DIRHOLD    = 10000
STEPLEN    = 5000
STEPSPACE  = 5000
STEP_SCALE = -400.0
MIN_LIMIT = -200.01
MAX_LIMIT = 0.001
HOME_OFFSET = 2.000000
HOME_SEARCH_VEL = 20.000000
HOME_LATCH_VEL = 5.00000
HOME_FINAL_VEL = 0.000000
HOME_USE_INDEX = NO
HOME_SEQUENCE = 0

# ============================================================
# EIXO Z — JOINT 1
# stepgen.01 — driver Z
# ============================================================
[AXIS_Z]
MAX_VELOCITY = 45.0
MAX_ACCELERATION = 200.0
MIN_LIMIT = -670.0
MAX_LIMIT = 0.001

[JOINT_1]
TYPE = LINEAR
HOME = 0.0
FERROR = 10.0
MIN_FERROR = 1.0
MAX_VELOCITY = 45.0
MAX_ACCELERATION = 200.0
STEPGEN_MAXVEL = 45
STEPGEN_MAXACCEL = 550
P = 1000.0
I = 0.0
D = 0.0
FF0 = 0.0
FF1 = 1.0
FF2 = 0.0
BIAS = 0.0
DEADBAND = 0.0
MAX_OUTPUT = 0.0
DIRSETUP   = 10000
DIRHOLD    = 10000
STEPLEN    = 5000
STEPSPACE  = 5000
STEP_SCALE = 400.0
MIN_LIMIT = -670.0
MAX_LIMIT = 0.001
HOME_OFFSET = 4.000000
HOME_SEARCH_VEL = 20.000000
HOME_LATCH_VEL = 5.00000
HOME_FINAL_VEL = 0.000000
HOME_USE_INDEX = NO
HOME_SEQUENCE = 1

# ============================================================
# EIXO C — JOINT 2 (Torre / magazine)
# stepgen.02 — driver torre
# ============================================================
[AXIS_C]
MAX_VELOCITY = 550.0
MAX_ACCELERATION = 5000.0
MIN_LIMIT = -9999.0
MAX_LIMIT = 9999.00

[JOINT_2]
TYPE = ANGULAR
HOME = 0.0
FERROR = 10.0
MIN_FERROR = 1.0
MAX_VELOCITY = 550.0
MAX_ACCELERATION = 5000.0
DIRSETUP   = 2000
DIRHOLD    = 2000
STEPLEN    = 2000
STEPSPACE  = 2000
STEPGEN_MAXVEL = 550
STEPGEN_MAXACCEL = 4000.0
STEP_SCALE = 40
HOME_SEARCH_VEL = 0.000000
HOME_LATCH_VEL = 0.00000
HOME_FINAL_VEL = 0.000000
HOME_USE_INDEX = NO
HOME_SEQUENCE = 1

# ============================================================
# SPINDLE — Servo HLTNC 3.8kW analógico 0-10V via pwmgen.00
# TB2 SPINOUT+ / SPINOUT- → AS+ / AS- do drive HLTNC T3DF
# Drive: P004=1 (velocidade), P005=1 (analógico)
#
# OUTPUT_SCALE: RPM máximo com relação de polia atual
# ENCODER_SCALE: pulsos por revolução do encoder (600PPR no eixo)
# ============================================================
[SPINDLE_0]
OUTPUT_SCALE = 2294.0
ENCODER_SCALE = 2400
P = 0.0
I = 0.0
D = 0.0
FF0 = 0.0
FF1 = 0.0
FF2 = 0.0
BIAS = 0.0
DEADBAND = 0.0
MAX_OUTPUT = 2294.0
MAX_ACCELERATION = 5.0
