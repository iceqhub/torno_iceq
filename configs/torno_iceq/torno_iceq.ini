# TORNO_ICEQ.ini
# Baseado na configuração funcional do protótipo (PNCconf 2.9.7)
# Adaptado para spindle servo HLTNC 3.8kW via step/dir
# Versão: 2.1 — Adicionado: [MPG] para handwheel
#
# ATENÇÃO — parâmetros que DEVEM ser ajustados antes de ligar os motores:
#   [JOINT_0] STEP_SCALE  = passos/mm do seu driver X
#   [JOINT_1] STEP_SCALE  = passos/mm do seu driver Z
#   [JOINT_2] STEP_SCALE  = passos/grau da torre (motor C)
#   [SPINDLE_0] MAX_OUTPUT = velocidade máxima em RPM (ex: 1200 com polia 2.23x)

[EMC]
MACHINE = TORNO_ICEQ
DEBUG = 0
VERSION = 1.1

[DISPLAY]
DISPLAY = axis
POSITION_OFFSET = RELATIVE
POSITION_FEEDBACK = ACTUAL
MAX_FEED_OVERRIDE = 1.200000
MAX_SPINDLE_OVERRIDE = 1.200000
MIN_SPINDLE_OVERRIDE = 0.000000
INTRO_GRAPHIC = linuxcnc.gif
INTRO_TIME = 5
PROGRAM_PREFIX = /home/iceq/torno_iceq/nc_files
INCREMENTS = 5mm 1mm .5mm .1mm .05mm .01mm .005mm
LATHE = 1
POSITION_FEEDBACK = ACTUAL
DEFAULT_LINEAR_VELOCITY = 45.000000
MAX_LINEAR_VELOCITY = 45.000000
MIN_LINEAR_VELOCITY = 0.000000
DEFAULT_ANGULAR_VELOCITY = 36.000000
MAX_ANGULAR_VELOCITY = 360.000000
MIN_ANGULAR_VELOCITY = 0.000000
EDITOR = gedit
GEOMETRY = xz
CYCLE_TIME = 100
PYVCP = custompanel.xml
EMBED_TAB_NAME = Handwheel
EMBED_TAB_COMMAND = gladevcp -c handwheel -x {XID} -H /home/iceq/torno_iceq/configs/torno_iceq/handwheel.hal /home/iceq/torno_iceq/configs/torno_iceq/handwheel.ui

TKPKG = Ngcgui 1.0
NGCGUI_PREAMBLE  = .ngcgui_start.ngc
NGCGUI_POSTAMBLE = .ngcgui_FIN.ngc
NGCGUI_FONT      = Helvetica -9 normal
NGCGUI_OPTIONS   = nonew noremove
NGCGUI_SUBFILE = /home/iceq/torno_iceq/nc_files/.facear.ngc
NGCGUI_SUBFILE = /home/iceq/torno_iceq/nc_files/.facear2.ngc
NGCGUI_SUBFILE = /home/iceq/torno_iceq/nc_files/.externo.ngc
NGCGUI_SUBFILE = /home/iceq/torno_iceq/nc_files/.interno.ngc
NGCGUI_SUBFILE = /home/iceq/torno_iceq/nc_files/.rosca.ngc
NGCGUI_SUBFILE = /home/iceq/torno_iceq/nc_files/.sangrar.ngc
NGCGUI_SUBFILE = /home/iceq/torno_iceq/nc_files/.canal_diam.ngc
NGCGUI_SUBFILE = /home/iceq/torno_iceq/nc_files/.furacao.ngc
NGCGUI_SUBFILE = /home/iceq/torno_iceq/nc_files/.perfil.ngc
NGCGUI_SUBFILE = /home/iceq/torno_iceq/nc_files/.polias.ngc

[FILTER]
PROGRAM_EXTENSION = .png,.gif,.jpg Greyscale Depth Image
PROGRAM_EXTENSION = .py Python Script
png = image-to-gcode
gif = image-to-gcode
jpg = image-to-gcode
py = python

[TASK]
TASK = milltask
CYCLE_TIME = 0.010

[RS274NGC]
PARAMETER_FILE = linuxcnc.var
RS274NGC_STARTUP_CODE = G21 G40 G90 G94 G97 G64 P0.025 G7
SUBROUTINE_PATH = /home/iceq/torno_iceq/nc_files:/home/iceq/linuxcnc/nc_files
REMAP = M6 modalgroup=6 ngc=.m6

[EMCMOT]
EMCMOT = motmod
COMM_TIMEOUT = 1.0
SERVO_PERIOD = 1000000

[HMOT]
CARD0 = hm2_7i96s.0

[HAL]
HALUI = halui
HALFILE = torno_iceq.hal
HALFILE = custom.hal
POSTGUI_HALFILE = custom_postgui.hal
SHUTDOWN = shutdown.hal

[HALUI]
MDI_COMMAND = T01M6G43
MDI_COMMAND = T02M6G43
MDI_COMMAND = T03M6G43
MDI_COMMAND = T04M6G43
MDI_COMMAND = T05M6G43
MDI_COMMAND = T06M6G43
MDI_COMMAND = T07M6G43
MDI_COMMAND = T08M6G43
MDI_COMMAND = T09M6G43
MDI_COMMAND = T10M6G43
MDI_COMMAND = T11M6G43
MDI_COMMAND = T12M6G43
MDI_COMMAND = T13M6G43
MDI_COMMAND = T14M6G43
MDI_COMMAND = T15M6G43
MDI_COMMAND = o<.m3>call
MDI_COMMAND = o<.m4>call
MDI_COMMAND = M5
MDI_COMMAND = o<.seta_x>call
MDI_COMMAND = o<.seta_xneg>call
MDI_COMMAND = o<.seta_z>call
MDI_COMMAND = o<.restaura>call
MDI_COMMAND = G97 S0
MDI_COMMAND = o<.seta_z_neg>call
MDI_COMMAND = o<.abort>call
MDI_COMMAND = o<.ativa>call
MDI_COMMAND = o<.desativa>call
MDI_COMMAND = M64P6
MDI_COMMAND = G91 C1 F500
MDI_COMMAND = G91 C-1 F500
MDI_COMMAND = T16M6G43

[KINS]
JOINTS = 3
KINEMATICS = trivkins coordinates=XZC

[TRAJ]
COORDINATES = XZC
LINEAR_UNITS = mm
ANGULAR_UNITS = degree
DEFAULT_LINEAR_VELOCITY = 2.50
MAX_LINEAR_VELOCITY = 25.00
NO_FORCE_HOMING = 1
SPINDLES = 1

[EMCIO]
EMCIO = io
CYCLE_TIME = 0.100
TOOL_TABLE = tool.tbl
NUM_DIO = 16

# ============================================================
# MPG — Handwheel 100PPR chinesa                 ← NOVO
# SCALE = pulsos por unidade do encoder
# 100PPR → 100 pulsos por volta do volante
# O jog real em mm é controlado pela escala selecionada no painel
# ============================================================
[MPG]
SCALE = 100


#******************************************
# EIXO X — JOINT 0
#******************************************
[AXIS_X]
MAX_VELOCITY = 45.0
MAX_ACCELERATION = 200.0
MIN_LIMIT = -200.01
MAX_LIMIT = 0.001

[JOINT_0]
TYPE = LINEAR
HOME = 0.0
FERROR = 10.0
MIN_FERROR = 1.0
MAX_VELOCITY = 45.0
MAX_ACCELERATION = 200.0
STEPGEN_MAXVEL = 50
STEPGEN_MAXACCEL = 800
P = 0.0
I = 0.0
D = 0
FF0 = 0.0
FF1 = 1.00
FF2 = 0.0
BIAS = 0.0
DEADBAND = 0.05
MAX_OUTPUT = 0.0
DIRSETUP   = 10000
DIRHOLD    = 10000
STEPLEN    = 5000
STEPSPACE  = 5000
STEP_SCALE = -400.0
MIN_LIMIT = -200.01
MAX_LIMIT = 0.001
HOME_OFFSET = 2.000000
HOME_SEARCH_VEL = 20.000000
HOME_LATCH_VEL = 5.00000
HOME_FINAL_VEL = 0.000000
HOME_USE_INDEX = NO
HOME_SEQUENCE = 0


#******************************************
# EIXO Z — JOINT 1
#******************************************
[AXIS_Z]
MAX_VELOCITY = 45.0
MAX_ACCELERATION = 200.0
MIN_LIMIT = -670.0
MAX_LIMIT = 0.001

[JOINT_1]
TYPE = LINEAR
HOME = 0.0
FERROR = 10.0
MIN_FERROR = 1.0
MAX_VELOCITY = 45.0
MAX_ACCELERATION = 200.0
STEPGEN_MAXVEL = 45
STEPGEN_MAXACCEL = 550
P = 1000.0
I = 0.0
D = 0.0
FF0 = 0.0
FF1 = 1.0
FF2 = 0.0
BIAS = 0.0
DEADBAND = 0.0
MAX_OUTPUT = 0.0
DIRSETUP   = 10000
DIRHOLD    = 10000
STEPLEN    = 5000
STEPSPACE  = 5000
STEP_SCALE = 400.0
MIN_LIMIT = -670.0
MAX_LIMIT = 0.001
HOME_OFFSET = 4.000000
HOME_SEARCH_VEL = 20.000000
HOME_LATCH_VEL = 5.00000
HOME_FINAL_VEL = 0.000000
HOME_USE_INDEX = NO
HOME_SEQUENCE = 1


#******************************************
# EIXO C — JOINT 2 (Torre / magazine)
#******************************************
[AXIS_C]
MAX_VELOCITY = 550.0
MAX_ACCELERATION = 5000.0
MIN_LIMIT = -9999.0
MAX_LIMIT = 9999.00

[JOINT_2]
TYPE = ANGULAR
HOME = 0.0
FERROR = 10.0
MIN_FERROR = 1.0
MAX_VELOCITY = 550.0
MAX_ACCELERATION = 5000.0
DIRSETUP   = 2000
DIRHOLD    = 2000
STEPLEN    = 2000
STEPSPACE  = 2000
STEPGEN_MAXVEL = 550
STEPGEN_MAXACCEL = 4000.0
STEP_SCALE = 40
HOME_SEARCH_VEL = 0.000000
HOME_LATCH_VEL = 0.00000
HOME_FINAL_VEL = 0.000000
HOME_USE_INDEX = NO
HOME_SEQUENCE = 1


#******************************************
# SPINDLE — Servo HLTNC 3.8kW analógico 0-10V
#******************************************
[SPINDLE_0]
OUTPUT_SCALE = 1200.0
ENCODER_SCALE = 600
P = 0.0
I = 0.0
D = 0.0
FF0 = 0.0
FF1 = 0.0
FF2 = 0.0
BIAS = 0.0
DEADBAND = 0.0
MAX_OUTPUT = 1200.0
MAX_ACCELERATION = 5.0
