# TORNO_ICEQ.ini
# Baseado na configuração funcional do protótipo (PNCconf 2.9.7)
# Adaptado para spindle servo HLTNC 3.8kW via step/dir
# Versão: 2.1 — adicionado [PYTHON], MDI commands completos, NGCGUI
#
# ATENÇÃO — parâmetros que DEVEM ser ajustados antes de ligar os motores:
#   [JOINT_0] STEP_SCALE  = passos/mm do seu driver X
#   [JOINT_1] STEP_SCALE  = passos/mm do seu driver Z
#   [JOINT_2] STEP_SCALE  = passos/grau da torre (motor C)
#   [SPINDLE_0] STEP_SCALE = pulsos/rev do driver HLTNC
#   [SPINDLE_0] MAX_OUTPUT = velocidade máxima em RPS (ex: 1200RPM/60 = 20.0)

[EMC]
MACHINE = TORNO_ICEQ
DEBUG = 0
VERSION = 2.1

[DISPLAY]
DISPLAY = axis
POSITION_OFFSET = RELATIVE
POSITION_FEEDBACK = ACTUAL
MAX_FEED_OVERRIDE = 1.200000
MAX_SPINDLE_OVERRIDE = 1.200000
MIN_SPINDLE_OVERRIDE = 0.000000
INTRO_GRAPHIC = linuxcnc.gif
INTRO_TIME = 5
PROGRAM_PREFIX = /home/iceq/torno_iceq/nc_files
INCREMENTS = 5mm 1mm .5mm .1mm .05mm .01mm .005mm
LATHE = 1
POSITION_FEEDBACK = ACTUAL
DEFAULT_LINEAR_VELOCITY = 45.000000
MAX_LINEAR_VELOCITY = 45.000000
MIN_LINEAR_VELOCITY = 0.000000
DEFAULT_ANGULAR_VELOCITY = 36.000000
MAX_ANGULAR_VELOCITY = 360.000000
MIN_ANGULAR_VELOCITY = 0.000000
EDITOR = gedit
GEOMETRY = xz
CYCLE_TIME = 100
PYVCP = custompanel.xml

# NGCGUI — abas de usinagem no painel
NGCGUI_PREAMBLE  = .ngcgui_start.ngc
NGCGUI_SUBFILE   = .facear.ngc
NGCGUI_SUBFILE   = .externo.ngc
NGCGUI_SUBFILE   = .interno.ngc
NGCGUI_SUBFILE   = .furacao.ngc
NGCGUI_SUBFILE   = .rosca.ngc
NGCGUI_SUBFILE   = .canal_diam.ngc
NGCGUI_SUBFILE   = .sangrar.ngc
NGCGUI_SUBFILE   = .perfil.ngc
NGCGUI_POSTAMBLE = .ngcgui_FIN.ngc
NGCGUI_OPTIONS   = nonew noremove

[FILTER]
PROGRAM_EXTENSION = .png,.gif,.jpg Greyscale Depth Image
PROGRAM_EXTENSION = .py Python Script
png = image-to-gcode
gif = image-to-gcode
jpg = image-to-gcode
py = python

[TASK]
TASK = milltask
CYCLE_TIME = 0.010

# ============================================================
# PYTHON — necessário para REMAP M6 e M400
# Copiar pasta python/ da porta paralela para configs/torno_iceq/python/
# ============================================================
[PYTHON]
PATH_PREPEND = ./python
PATH_APPEND  = ./python/remap_lib/python-stdglue
TOPLEVEL     = python/toplevel.py

[RS274NGC]
PARAMETER_FILE = linuxcnc.var
# STARTUP: executa .startup.ngc ao abrir (zera contadores, restaura limites, etc)
RS274NGC_STARTUP_CODE = o<.startup>call
SUBROUTINE_PATH = /home/iceq/torno_iceq/nc_files
REMAP = M6   modalgroup=6  ngc=.m6
REMAP = M400 modalgroup=10 py=m400

[EMCMOT]
EMCMOT = motmod
COMM_TIMEOUT = 1.0
SERVO_PERIOD = 1000000

[HMOT]
CARD0 = hm2_7i96s.0

[HAL]
HALUI = halui
HALFILE = torno_iceq.hal
HALFILE = custom.hal
POSTGUI_HALFILE = custom_postgui.hal
SHUTDOWN = shutdown.hal

# ============================================================
# MDI COMMANDS — indexação idêntica à porta paralela
# Referência no custom_postgui.hal:
#   mdi-command-00 a 14 = T01~T15
#   mdi-command-15 = M3 (spindle CW)
#   mdi-command-16 = M4 (spindle CCW)
#   mdi-command-17 = M5 (spindle stop)
#   mdi-command-18 = seta-x
#   mdi-command-19 = seta-xneg
#   mdi-command-20 = seta-z
#   mdi-command-21 = restaura
#   mdi-command-22 = set-rpm (reservado)
#   mdi-command-23 = seta-z-neg
#   mdi-command-24 = abort/reset
#   mdi-command-25 = ativa
#   mdi-command-26 = desativa
#   mdi-command-27 = solenoide (M64P6)
#   mdi-command-28 = gira torre CW (M64P7)
#   mdi-command-29 = gira torre CCW (M64P8)
#   mdi-command-30 = T16
# ============================================================
[HALUI]
MDI_COMMAND = T01M6G43
MDI_COMMAND = T02M6G43
MDI_COMMAND = T03M6G43
MDI_COMMAND = T04M6G43
MDI_COMMAND = T05M6G43
MDI_COMMAND = T06M6G43
MDI_COMMAND = T07M6G43
MDI_COMMAND = T08M6G43
MDI_COMMAND = T09M6G43
MDI_COMMAND = T10M6G43
MDI_COMMAND = T11M6G43
MDI_COMMAND = T12M6G43
MDI_COMMAND = T13M6G43
MDI_COMMAND = T14M6G43
MDI_COMMAND = T15M6G43
MDI_COMMAND = o<.m3>call
MDI_COMMAND = o<.m4>call
MDI_COMMAND = M5
MDI_COMMAND = o<.seta_x>call
MDI_COMMAND = o<.seta_xneg>call
MDI_COMMAND = o<.seta_z>call
MDI_COMMAND = o<.restaura>call
MDI_COMMAND = G97 S#<_hal[pyvcp.rpm]>
MDI_COMMAND = o<.seta_z_neg>call
MDI_COMMAND = o<.abort>call
MDI_COMMAND = o<.ativa>call
MDI_COMMAND = o<.desativa>call
MDI_COMMAND = M64P6
MDI_COMMAND = M64P7
MDI_COMMAND = M64P8
MDI_COMMAND = T16M6G43

[KINS]
JOINTS = 3
KINEMATICS = trivkins coordinates=XZC

[TRAJ]
COORDINATES = XZC
LINEAR_UNITS = mm
ANGULAR_UNITS = degree
DEFAULT_LINEAR_VELOCITY = 2.50
MAX_LINEAR_VELOCITY = 25.00
NO_FORCE_HOMING = 1

[EMCIO]
EMCIO = io
CYCLE_TIME = 0.100
TOOL_TABLE = tool.tbl
NUM_DIO = 16


#******************************************
# EIXO X — JOINT 0
#******************************************
[AXIS_X]
MAX_VELOCITY = 45.0
MAX_ACCELERATION = 200.0
MIN_LIMIT = -200.01
MAX_LIMIT = 200.0

[JOINT_0]
TYPE = LINEAR
HOME = 0.0
FERROR = 10.0
MIN_FERROR = 1.0
MAX_VELOCITY = 45.0
MAX_ACCELERATION = 200.0
STEPGEN_MAXVEL = 50
STEPGEN_MAXACCEL = 800
P = 0.0
I = 0.0
D = 0
FF0 = 0.0
FF1 = 1.00
FF2 = 0.0
BIAS = 0.0
DEADBAND = 0.05
MAX_OUTPUT = 0.0
DIRSETUP   = 10000
DIRHOLD    = 10000
STEPLEN    = 5000
STEPSPACE  = 5000
STEP_SCALE = -400.0
